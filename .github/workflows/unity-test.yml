# Unity Tests + Build CI for Alcyone-Ember-RPG
# - EditMode tests (pure C# logic, no Unity rendering)
# - PlayMode tests (in-engine, captures screenshots/coverage)
# - Linux64 headless build artifact
# - Test results + screenshots uploaded for Alcyone to review on Pi
#
# NOTE: unity-test-runner can optionally post a GitHub Check when given
# githubToken/checkName. That post can fail with "Resource not accessible by
# integration" after Unity has already passed, which incorrectly fails the job
# and blocks PlayMode/screenshots. Keep test evidence in uploaded artifacts
# instead so CI status reflects Unity's actual test exit code.
#
# REQUIRES (one-time secrets setup):
#   UNITY_EMAIL     - Unity ID email
#   UNITY_PASSWORD  - Unity ID password
#   UNITY_LICENSE   - Personal license .ulf content (run unity-activate workflow once)
#   (or UNITY_SERIAL for Plus/Pro license)

name: Unity Tests

on:
  push:
    branches: [main, dev/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UNITY_VERSION: 6000.3.13f1  # Matches ProjectSettings/ProjectVersion.txt

jobs:
  # 1. EditMode Tests — Pure C# logic, fast (~5 min)
  editmode-tests:
    name: EditMode Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-EditMode-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-EditMode-
            Library-

      - name: Run EditMode Tests
        id: editmode
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          artifactsPath: editmode-results

      - name: Upload EditMode Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-test-results
          path: editmode-results
          retention-days: 30

  # 2. PlayMode Tests — In-engine, captures screenshots (~10-15 min)
  playmode-tests:
    name: PlayMode Tests + Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: editmode-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-PlayMode-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-PlayMode-
            Library-

      - name: Run PlayMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: playmode
          artifactsPath: playmode-results

      - name: Upload PlayMode Results + Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playmode-test-results
          path: playmode-results
          retention-days: 30

  # 3. Linux64 Build — Headless build artifact for Pi to download (~10 min)
  build-linux:
    name: Build Linux64 (headless)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [editmode-tests, playmode-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Build-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Build-

      - name: Build Linux64
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildName: alcyone-ember-rpg
          buildsPath: build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux64
          path: build/StandaloneLinux64
          retention-days: 14

  # 4. Summary — Posts test result summary to GitHub Actions UI
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [editmode-tests, playmode-tests]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Print summary
        run: |
          echo "=== Alcyone-Ember-RPG Test Run Summary ==="
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo
          echo "EditMode result: ${{ needs.editmode-tests.result }}"
          echo "PlayMode result: ${{ needs.playmode-tests.result }}"
          echo
          ls -la all-results/ 2>/dev/null || echo "No artifacts"

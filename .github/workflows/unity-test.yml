# Unity EditMode CI for Alcyone-Ember-RPG
#
# Pure C# logic tests. PlayMode + Linux build run on demand only.
#
# Removed (audit 2026-05-15):
# - PlayMode tests: were synthetic gradient PNGs, not real visual testing.
#   The 3 spell-cast "tests" generated a procedural Color.Lerp pattern in
#   ScreenshotUtility.CaptureFrame instead of capturing actual rendered
#   frames. They cost 10-15 min Unity CI per PR for no real signal.
# - Build Linux64 on every main push: we don't distribute the build.
# - Test Summary job: redundant with the EditMode job result.
#
# When real visual coverage is needed (e.g. an actual rendered-scene
# regression test), reintroduce a PlayMode test that uses
# ScreenCapture.CaptureScreenshotAsTexture inside a Unity scene, not
# procedural pixel math.
#
# REQUIRES (one-time secrets setup):
#   UNITY_EMAIL     - Unity ID email
#   UNITY_PASSWORD  - Unity ID password
#   UNITY_LICENSE   - Personal license .ulf content (run unity-activate workflow once)
#   (or UNITY_SERIAL for Plus/Pro license)

name: Unity Tests

on:
  push:
    branches: [main, dev/**, feat/**] # HYG-10: run the static-audit gate on feature pushes too
    tags: ['v*']
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      run_playmode:
        description: 'Also run PlayMode tests'
        type: boolean
        default: false
      run_build:
        description: 'Also build StandaloneLinux64 artifact'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

env:
  UNITY_VERSION: 6000.3.13f1  # Matches ProjectSettings/ProjectVersion.txt

jobs:
  # Static asset/source audit — pure bash, no Unity, ~30s (audit EMB-027/004/002).
  # Catches the false-greens the Unity EditMode job can't: duplicate .meta GUIDs,
  # tracked assets whose .meta is untracked (clean-clone reference breakage), and
  # wall-clock / engine-RNG leaks into the deterministic Domain/Save tiers.
  static-audit:
    name: Static Asset Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false  # static-audit is designed to run on a source-only (pointer) checkout
      - name: Run static asset/source audit
        run: bash tools/validation/static-audit.sh

  # EditMode Tests — Pure C# logic, ~5 min.
  #
  # HONESTY SCOPE (audit EMB3-006/007): this job runs on a SOURCE-ONLY checkout
  # (lfs: false, see below) and exercises only Unity EditMode / pure-C# logic
  # tests. A GREEN result here therefore proves the deterministic Domain /
  # Simulation / Save / UI-formatter logic compiles and passes — and NOTHING
  # MORE. In particular a green check here does NOT prove any of:
  #   - runtime LLM / AI-DM behaviour (no model bytes, no network, no PlayMode);
  #   - generated-art / diffusion / ONNX inference (the .onnx/.gguf/.pb weights
  #     are LFS pointer stubs that are never resolved in this job);
  #   - a working Windows (or any) player build (no build step runs here);
  #   - scene wiring, prefabs, .meta integrity, or native plugins.
  # Those require the opt-in PlayMode / build jobs (still lfs:false today — see
  # their notes) and/or local Unity runs. Do not read this badge as runtime proof.
  editmode-tests:
    name: EditMode Tests (source-only - green is NOT runtime/LLM/art/build proof)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: static-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # LFS account budget keeps getting exhausted; checkout without it (PR #214 EditMode
          # run failed with "exceeded its LFS budget"). EditMode tests only need source code
          # — the ai.assistant DLLs are referenced as assets but Unity tolerates missing LFS
          # pointer files in batchmode (logs warnings, continues). PlayMode/build jobs that
          # truly need binaries should restore LFS in a tolerant follow-up step.
          # NOTE (EMB3-006/007): because LFS is skipped, the model/art binaries are
          # pointer stubs here — this run cannot and does not validate runtime AI/art.
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-EditMode-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-EditMode-
            Library-

      # The com.unity.ai.assistant editor tool is embedded under
      # Packages/com.unity.ai.assistant/ on Mami's local machine but the
      # 538 MB folder is gitignored, so CI never has it. Strip the file:
      # reference from manifest.json so Unity's package resolver does not
      # bail with "package.json cannot be found". The embedded package is
      # editor-only and unused by tests.
      - name: Strip editor-only embedded packages from manifest
        run: |
          if grep -q '"com.unity.ai.assistant"' Packages/manifest.json; then
            sed -i '/"com.unity.ai.assistant"/d' Packages/manifest.json
            echo "Stripped com.unity.ai.assistant from manifest for CI."
          fi
          # com.unity.ai.inference is re-added by Unity Editor on Mami's dev
          # machine because the embedded ai.assistant package references
          # Unity.InferenceEngine. Strip it on CI — the ONNX backend uses
          # Microsoft.ML.OnnxRuntime (pure-C# DLL), not Sentis.
          if grep -q '"com.unity.ai.inference"' Packages/manifest.json; then
            sed -i '/"com.unity.ai.inference"/d' Packages/manifest.json
            echo "Stripped com.unity.ai.inference from manifest for CI."
          fi

      - name: Run EditMode Tests
        id: editmode
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          artifactsPath: editmode-results

      - name: Upload EditMode Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: editmode-test-results
          path: editmode-results
          retention-days: 30

  # PlayMode Tests — Opt-in via workflow_dispatch only.
  # CAVEAT (EMB3-006/007): this job ALSO checks out with lfs: false (see step
  # below), so the LFS-backed model/art binaries are unresolved pointer stubs.
  # Even a green PlayMode run here does not prove runtime LLM inference or
  # generated-art output — it only exercises scene/runtime logic that tolerates
  # missing binaries. Restore LFS before treating this as runtime AI/art proof.
  playmode-tests:
    name: PlayMode Tests (lfs:false - not runtime AI/art proof)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_playmode == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: editmode-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # LFS account budget keeps getting exhausted; checkout without it (PR #214 EditMode
          # run failed with "exceeded its LFS budget"). EditMode tests only need source code
          # — the ai.assistant DLLs are referenced as assets but Unity tolerates missing LFS
          # pointer files in batchmode (logs warnings, continues). PlayMode/build jobs that
          # truly need binaries should restore LFS in a tolerant follow-up step.
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-PlayMode-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-PlayMode-
            Library-

      - name: Strip editor-only embedded packages from manifest
        run: |
          if grep -q '"com.unity.ai.assistant"' Packages/manifest.json; then
            sed -i '/"com.unity.ai.assistant"/d' Packages/manifest.json
          fi

      - name: Run PlayMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: playmode
          artifactsPath: playmode-results

      - name: Upload PlayMode Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playmode-test-results
          path: playmode-results
          retention-days: 30

  # Linux64 Build — Opt-in via workflow_dispatch or tag push only.
  # CAVEAT (EMB3-006/007): builds StandaloneLinux64 (NOT Windows) and checks out
  # with lfs: false, so the produced player ships pointer stubs in place of the
  # real model/art binaries. A green build proves the project compiles into a
  # Linux player shell — it does not prove a shippable Windows build nor that
  # runtime AI/art assets are present.
  build-linux:
    name: Build Linux64 (headless, lfs:false - not a Windows/runtime-asset proof)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_build == true) || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: editmode-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # LFS account budget keeps getting exhausted; checkout without it (PR #214 EditMode
          # run failed with "exceeded its LFS budget"). EditMode tests only need source code
          # — the ai.assistant DLLs are referenced as assets but Unity tolerates missing LFS
          # pointer files in batchmode (logs warnings, continues). PlayMode/build jobs that
          # truly need binaries should restore LFS in a tolerant follow-up step.
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Build-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Build-

      - name: Strip editor-only embedded packages from manifest
        run: |
          if grep -q '"com.unity.ai.assistant"' Packages/manifest.json; then
            sed -i '/"com.unity.ai.assistant"/d' Packages/manifest.json
          fi

      - name: Build Linux64
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: StandaloneLinux64
          buildName: alcyone-ember-rpg
          buildsPath: build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux64
          path: build/StandaloneLinux64
          retention-days: 14
